name: Formula Bug Report
description: Report a reproducible installation, audit, or package problem.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Do not include AWS credentials, account IDs, profile names, identity
        output, or organization-specific information.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched the existing issues and did not find this problem.
          required: true
        - label: I removed credentials and sensitive information from this report.
          required: true

  - type: input
    id: platform
    attributes:
      label: macOS version and architecture
      placeholder: "Example: macOS 26 on Apple Silicon"
    validations:
      required: true

  - type: input
    id: homebrew
    attributes:
      label: Homebrew version
      placeholder: "Output of brew --version"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the tap, install, audit, or test commands that fail.
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      description: Remove usernames, paths, profiles, accounts, identities, and credentials.
      render: shell
    validations:
      required: true
